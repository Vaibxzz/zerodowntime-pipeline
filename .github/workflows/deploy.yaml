name: CD — Deploy with Canary

on:
  workflow_run:
    workflows: ["CI — Lint, Test & Build"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zerodowntime-app
  NAMESPACE: zerodowntime
  CANARY_WEIGHT_START: "10"
  CANARY_WEIGHT_MIDDLE: "50"
  CANARY_ANALYSIS_SECONDS: "120"
  ERROR_RATE_THRESHOLD: "5"

jobs:
  # ──────────────────────────────────────────────
  # 1. Deploy canary (10% traffic)
  # ──────────────────────────────────────────────
  canary-deploy:
    name: Deploy Canary
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy canary pods
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          kubectl set image deployment/zerodowntime-app-canary \
            app="$IMAGE" -n "$NAMESPACE" || \
          kubectl apply -k k8s/canary -n "$NAMESPACE"

          kubectl rollout status deployment/zerodowntime-app-canary \
            -n "$NAMESPACE" --timeout=120s

      - name: Set canary weight to ${{ env.CANARY_WEIGHT_START }}%
        run: |
          kubectl annotate ingress zerodowntime-app-canary \
            nginx.ingress.kubernetes.io/canary-weight="${{ env.CANARY_WEIGHT_START }}" \
            -n "$NAMESPACE" --overwrite

      - name: Notify Slack — canary started
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          bash scripts/notify.sh \
            ":canary: Canary deployed at ${{ env.CANARY_WEIGHT_START }}% traffic" \
            "warning" \
            "${{ steps.tag.outputs.tag }}"

  # ──────────────────────────────────────────────
  # 2. Analyse canary health
  # ──────────────────────────────────────────────
  canary-analysis:
    name: Canary Analysis
    runs-on: ubuntu-latest
    needs: canary-deploy
    outputs:
      healthy: ${{ steps.analyse.outputs.healthy }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Run smoke tests against canary
        run: bash scripts/smoke-test.sh canary

      - name: Analyse error rate
        id: analyse
        run: |
          bash scripts/canary-analysis.sh \
            "${{ env.CANARY_ANALYSIS_SECONDS }}" \
            "${{ env.ERROR_RATE_THRESHOLD }}"

  # ──────────────────────────────────────────────
  # 3a. Promote — canary is healthy
  # ──────────────────────────────────────────────
  promote:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: [canary-deploy, canary-analysis]
    if: needs.canary-analysis.outputs.healthy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Update stable deployment
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.canary-deploy.outputs.image_tag }}"

          kubectl set image deployment/zerodowntime-app \
            app="$IMAGE" -n "$NAMESPACE"

          kubectl rollout status deployment/zerodowntime-app \
            -n "$NAMESPACE" --timeout=300s

      - name: Scale down canary
        run: |
          kubectl scale deployment/zerodowntime-app-canary \
            --replicas=0 -n "$NAMESPACE"

          kubectl annotate ingress zerodowntime-app-canary \
            nginx.ingress.kubernetes.io/canary-weight="0" \
            -n "$NAMESPACE" --overwrite

      - name: Run production smoke tests
        run: bash scripts/smoke-test.sh stable

      - name: Notify Slack — promotion success
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          bash scripts/notify.sh \
            ":rocket: Production promoted to \`${{ needs.canary-deploy.outputs.image_tag }}\`" \
            "good" \
            "${{ needs.canary-deploy.outputs.image_tag }}"

  # ──────────────────────────────────────────────
  # 3b. Rollback — canary is unhealthy
  # ──────────────────────────────────────────────
  rollback:
    name: Rollback Canary
    runs-on: ubuntu-latest
    needs: [canary-deploy, canary-analysis]
    if: needs.canary-analysis.outputs.healthy != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Kill canary
        run: bash scripts/rollback.sh

      - name: Notify Slack — rollback
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          bash scripts/notify.sh \
            ":rotating_light: Canary ROLLED BACK — \`${{ needs.canary-deploy.outputs.image_tag }}\` failed analysis" \
            "danger" \
            "${{ needs.canary-deploy.outputs.image_tag }}"
