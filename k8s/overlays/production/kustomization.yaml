apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zerodowntime

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: zerodowntime-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Ingress
      name: zerodowntime-app
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: app.example.com
