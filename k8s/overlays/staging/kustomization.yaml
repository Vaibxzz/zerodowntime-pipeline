apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zerodowntime-staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: zerodowntime-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: zerodowntime-app
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4
  - target:
      kind: Ingress
      name: zerodowntime-app
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: staging.app.example.com
