apiVersion: apps/v1
kind: Deployment
metadata:
  name: zerodowntime-app-canary
  namespace: zerodowntime
  labels:
    app: zerodowntime-app
    track: canary
    app.kubernetes.io/name: zerodowntime-app
    app.kubernetes.io/part-of: zerodowntime-pipeline
spec:
  # Canary starts with 1 replica — receives ~25% of traffic (1 out of 3+1)
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: zerodowntime-app
      track: canary
  template:
    metadata:
      labels:
        app: zerodowntime-app
        track: canary
        version: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: app
          image: ghcr.io/vaibhavsrivastava/zerodowntime-app:canary
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              value: canary
            - name: DRAIN_DELAY
              value: "5s"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
